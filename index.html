<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>A4 Magazine Flipbook</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="assets/css/style.css">

    <script src="https://cdn.jsdelivr.net/npm/page-flip/dist/js/page-flip.browser.min.js"></script>

</head>

<body>

<div id="loader">

    <div class="book-loader">
        <span></span>
        <span></span>
        <span></span>
    </div>

    <h2>Loading Magazine...</h2>

</div>

<div class="background"></div>

<div class="viewer">

    <!-- Desktop Previous -->
    <button id="prevBtn" class="nav desktop-nav">
        &#10094;
    </button>

    <div id="book">

        <!-- Cover -->
        <div class="page hard">
            <img src="assets/images/cover.jpg">
        </div>

        <!-- Magazine Pages -->
        <div class="page">
            <img src="assets/images/cover.jpg">
        </div>

        <div class="page">
            <img src="assets/images/cover.jpg">
        </div>

        <div class="page">
            <img src="assets/images/cover.jpg">
        </div>

        <div class="page">
            <img src="assets/images/cover.jpg">
        </div>

        <div class="page">
            <img src="assets/images/page-05.jpg">
        </div>

        <div class="page">
            <img src="assets/images/page-06.jpg">
        </div>

        <div class="page">
            <img src="assets/images/page-07.jpg">
        </div>

        <div class="page">
            <img src="assets/images/page-08.jpg">
        </div>

        <div class="page">
            <img src="assets/images/page-09.jpg">
        </div>

        <div class="page">
            <img src="assets/images/page-10.jpg">
        </div>

        <div class="page">
            <img src="assets/images/page-11.jpg">
        </div>

        <div class="page">
            <img src="assets/images/page-12.jpg">
        </div>

        <!-- Back Cover -->
        <div class="page hard">
            <img src="assets/images/cover.jpg">
        </div>

    </div>

    <!-- Desktop Next -->
    <button id="nextBtn" class="nav desktop-nav">
        &#10095;
    </button>

    <!-- Mobile Navigation -->
    <div class="mobile-nav">

        <button id="prevBtnMobile" class="nav">
            &#10094;
        </button>

        <button id="nextBtnMobile" class="nav">
            &#10095;
        </button>

    </div>

</div>

<script src="assets/js/app.js"></script>

</body>
</html>
